<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FitCheck – Virtual Try-On</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; min-height: 100vh; }

    header {
      background: #1a1a1a;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a2a;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; color: #7c3aed; }
    header span { font-size: 0.85rem; color: #888; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Cart grid */
    .cart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .cart-card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .cart-card:hover { transform: translateY(-2px); }
    .cart-card.selected { border-color: #7c3aed; }
    .cart-card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; }
    .cart-card .info { padding: 10px 12px; }
    .cart-card .retailer {
      font-size: 0.7rem;
      text-transform: uppercase;
      color: #7c3aed;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }
    .cart-card .name { font-size: 0.85rem; line-height: 1.3; margin-bottom: 4px; }
    .cart-card .price { font-size: 0.8rem; color: #aaa; }
    .cart-card .check {
      position: absolute;
      top: 8px; right: 8px;
      background: #7c3aed;
      border-radius: 50%;
      width: 24px; height: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .cart-card.selected .check { display: flex; }

    /* Person upload */
    .upload-section { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 40px; flex-wrap: wrap; }
    .upload-box {
      flex: 1;
      min-width: 220px;
      max-width: 320px;
      background: #1a1a1a;
      border-radius: 12px;
      border: 2px dashed #333;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .upload-box:hover { border-color: #7c3aed; }
    .upload-box input { display: none; }
    .upload-box .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .upload-box p { font-size: 0.85rem; color: #aaa; }
    .upload-box img { width: 100%; border-radius: 8px; margin-top: 12px; }

    /* Try-on button */
    .tryon-btn {
      display: block;
      width: 100%;
      max-width: 400px;
      margin: 0 auto 40px;
      padding: 16px;
      background: #7c3aed;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .tryon-btn:disabled { opacity: 0.4; cursor: default; }
    .tryon-btn:not(:disabled):hover { background: #6d28d9; }

    /* Result */
    .result-section { display: none; text-align: center; margin-bottom: 40px; }
    .result-section img { max-width: 600px; width: 100%; border-radius: 16px; margin: 0 auto; display: block; }
    .result-section .label { color: #aaa; font-size: 0.85rem; margin-top: 12px; }

    /* Empty state */
    .empty { text-align: center; color: #555; padding: 48px; font-size: 0.95rem; }

    /* Status bar */
    #status { text-align: center; color: #7c3aed; font-size: 0.9rem; min-height: 20px; margin-bottom: 16px; }

    /* Spinner */
    .spinner {
      display: none;
      width: 40px; height: 40px;
      border: 4px solid #333;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>FitCheck</h1>
  <span>Virtual Try-On — powered by AI</span>
</header>

<div class="container">

  <div class="section-title">Your Cart Items — pick one to try on</div>
  <div id="cartGrid" class="cart-grid">
    <div class="empty">Loading your cart…</div>
  </div>

  <div class="section-title">Your Photo</div>
  <div class="upload-section">
    <div class="upload-box" id="uploadBox" onclick="document.getElementById('personFile').click()">
      <div class="icon">📸</div>
      <p>Click to upload a photo of yourself</p>
      <input type="file" id="personFile" accept="image/*" />
      <img id="personPreview" style="display:none" />
    </div>
  </div>

  <div id="status"></div>
  <div class="spinner" id="spinner"></div>

  <button class="tryon-btn" id="tryonBtn" disabled>✨ Try It On</button>

  <div class="result-section" id="resultSection">
    <div class="section-title">Result</div>
    <img id="resultImg" src="" alt="Try-on result" />
    <p class="label">AI-generated virtual try-on</p>
  </div>

</div>

<script>
const API = 'http://localhost:8000';
const params = new URLSearchParams(window.location.search);
const sessionId = params.get('session') || localStorage.getItem('fitcheck_session');

let selectedItem  = null;
let personFile    = null;
let personCached  = false;  // true if API has a photo stored for this session

// ── Load cart ─────────────────────────────────────────────────────────────────
async function loadCart() {
  if (!sessionId) {
    document.getElementById('cartGrid').innerHTML =
      '<div class="empty">No session found. Add items via the browser extension.</div>';
    return;
  }
  try {
    const res = await fetch(`${API}/api/items`, {
      headers: { 'X-Session-ID': sessionId }
    });
    const data = await res.json();
    renderCart(data.items || []);
  } catch(e) {
    document.getElementById('cartGrid').innerHTML =
      '<div class="empty">Could not reach API. Is Docker running?</div>';
  }
}

function renderCart(items) {
  const grid = document.getElementById('cartGrid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty">No items yet — browse Amazon, H&M, Depop or Shein and click Add to Cart.</div>';
    return;
  }
  grid.innerHTML = items.map(item => `
    <div class="cart-card" data-id="${item.id}" onclick="selectItem(this, ${JSON.stringify(item).replace(/"/g, '&quot;')})">
      <div class="check">✓</div>
      <img src="${item.image_url}" alt="${item.name}" onerror="this.src='https://placehold.co/300x400/1a1a1a/555?text=No+Image'" />
      <div class="info">
        <div class="retailer">${item.retailer}</div>
        <div class="name">${item.name}</div>
        <div class="price">${item.price || ''}</div>
      </div>
    </div>
  `).join('');

  // Auto-select first item so user only needs to upload a photo
  const firstCard = document.querySelector('.cart-card');
  if (firstCard) firstCard.click();
}

function selectItem(el, item) {
  document.querySelectorAll('.cart-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedItem = item;
  updateButton();
}

// ── Person photo ───────────────────────────────────────────────────────────────
document.getElementById('personFile').addEventListener('change', e => {
  personFile = e.target.files[0];
  if (!personFile) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('personPreview');
    img.src = ev.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(personFile);
  updateButton();
});

function updateButton() {
  document.getElementById('tryonBtn').disabled = !(selectedItem && (personFile || personCached));
}

async function checkCachedPerson() {
  if (!sessionId) return;
  try {
    const res  = await fetch(`${API}/api/tryon/person?session_id=${sessionId}`);
    const data = await res.json();
    if (data.cached) {
      personCached = true;
      document.getElementById('uploadBox').querySelector('p').textContent =
        '✓ Photo on file — upload a new one to change it';
      updateButton();
    }
  } catch(_) {}
}

// ── Try-on ─────────────────────────────────────────────────────────────────────
document.getElementById('tryonBtn').addEventListener('click', async () => {
  if (!selectedItem || (!personFile && !personCached)) return;

  setStatus('Sending to try-on pipeline…');
  showSpinner(true);
  document.getElementById('tryonBtn').disabled = true;

  try {
    const fd = new FormData();
    fd.append('person', personFile);
    fd.append('garment_url', selectedItem.image_url);
    fd.append('garment_name', selectedItem.name);
    fd.append('session_id', sessionId);

    const res = await fetch(`${API}/api/tryon`, { method: 'POST', body: fd });
    if (!res.ok) throw new Error(await res.text());

    const blob = await res.blob();
    const url  = URL.createObjectURL(blob);
    document.getElementById('resultImg').src = url;
    document.getElementById('resultSection').style.display = 'block';
    setStatus('Done! ✨');
  } catch(e) {
    setStatus('Error: ' + e.message);
  } finally {
    showSpinner(false);
    document.getElementById('tryonBtn').disabled = false;
  }
});

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showSpinner(v) { document.getElementById('spinner').style.display = v ? 'block' : 'none'; }

loadCart();
checkCachedPerson();
</script>
</body>
</html>
