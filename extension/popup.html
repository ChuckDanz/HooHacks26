<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FitCheck</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="logo">FitCheck</span>
    <button id="clearBtn" title="Clear all items">✕ Clear</button>
  </header>

  <div id="list"></div>

  <div id="empty" style="display:none">
    <p>No items yet.</p>
    <p class="hint">Browse Amazon, H&M, Depop or Shein<br>and click <strong>Add to Cart</strong>.</p>
  </div>

  <footer>
    <button id="tryonBtn" disabled>✨ Try On in FitCheck</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
